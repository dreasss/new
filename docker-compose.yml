version: "3.9"
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  core-api:
    build: ./core-api
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request;urllib.request.urlopen('http://127.0.0.1:8000/health',timeout=5).read()"]
      interval: 10s
      timeout: 5s
      retries: 20

  web-portal:
    build: ./web-portal
    environment:
      NEXT_PUBLIC_CORE_API_URL: ${NEXT_PUBLIC_CORE_API_URL}
    ports:
      - "3000:3000"
    depends_on:
      core-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 20

  asterisk:
    image: andrius/asterisk:18
    ports:
      - "5060:5060/udp"
      - "8088:8088"
    volumes:
      - ./infra/asterisk/ari.conf:/etc/asterisk/ari.conf
      - ./infra/asterisk/http.conf:/etc/asterisk/http.conf
      - ./infra/asterisk/extensions.conf:/etc/asterisk/extensions.conf
      - ./infra/asterisk/pjsip.conf:/etc/asterisk/pjsip.conf
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -qO- http://127.0.0.1:8088/ari/asterisk/info --user=${ASTERISK_ARI_USERNAME} --password=${ASTERISK_ARI_PASSWORD} >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 20

  telephony-bot:
    build: ./telephony-bot
    env_file: .env
    ports:
      - "8010:8010"
    depends_on:
      asterisk:
        condition: service_healthy
      core-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request;urllib.request.urlopen('http://127.0.0.1:8010/health',timeout=5).read()"]
      interval: 10s
      timeout: 5s
      retries: 20

volumes:
  postgres_data:
